name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint
        run: |
          if [ -f package.json ]; then npm run lint 2>/dev/null || true; fi
      - name: Test
        run: |
          if [ -f package.json ]; then npm test 2>/dev/null || true; fi
          if [ -f pytest.ini ]; then pytest 2>/dev/null || true; fi
      - name: Build
        run: |
          if [ -f package.json ]; then npm run build 2>/dev/null || true; fi
      - name: Build Docker
        run: docker build -t app .
